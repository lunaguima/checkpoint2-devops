services:
  db-manga:
    image: mysql:8.0
    container_name: db-manga
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mangadb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  app-manga:
    build: .
    container_name: api-animes
    ports:
      - "80:8080"
    depends_on:
      db-manga:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-manga:3306/mangadb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
